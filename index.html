<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Lab v2+</title>

<style>
html,body{
margin:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont;
background:#ddd;
overflow:hidden;
}

#view{
position:fixed;
width:100%;
height:100%;
background-repeat:repeat;
background-color:#ddd;
}

#grid{
position:fixed;
width:100%;
height:100%;
pointer-events:none;

background-image:
linear-gradient(rgba(0,0,0,0.15) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,0,0,0.15) 1px, transparent 1px);

background-size:200px 200px;
display:none;
}

#drop{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:20px;
border:4px dashed rgba(0,0,0,0.2);
background:rgba(255,255,255,0.4);
}

.panel{
position:fixed;
left:20px;
top:20px;
width:260px;
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

.control{
margin-bottom:12px;
}

label{
font-size:12px;
font-weight:600;
}

input,select{
width:100%;
}

button{
width:100%;
margin-top:5px;
padding:8px;
border:none;
background:#333;
color:white;
border-radius:6px;
}
</style>

</head>

<body>

<div id="view"></div>
<div id="grid"></div>

<div id="drop">
이미지를 드래그하거나 클릭하세요
<input type="file" id="file" hidden accept="image/*">
</div>

<div class="panel">

<h2>Pattern Lab v2+</h2>

<div class="control">
<label>Scale</label>
<input type="range" id="scale" min="50" max="800" value="200">
</div>

<div class="control">
<label>Offset X</label>
<input type="range" id="offsetX" min="0" max="500" value="0">
</div>

<div class="control">
<label>Offset Y</label>
<input type="range" id="offsetY" min="0" max="500" value="0">
</div>

<div class="control">
<label>Repeat Mode</label>
<select id="repeatMode">
<option value="basic">Basic</option>
<option value="zigzagX">Zigzag X (가로)</option>
<option value="zigzagY">Zigzag Y (세로)</option>
<option value="zigzagXY">Zigzag XY (전체)</option>
</select>
</div>

<div class="control">
<label>Background</label>
<input type="color" id="bg" value="#dddddd">
</div>

<button id="gridBtn">Grid Toggle</button>

</div>

<script>

const view=document.getElementById("view")
const grid=document.getElementById("grid")

const drop=document.getElementById("drop")
const fileInput=document.getElementById("file")

const scale=document.getElementById("scale")
const offsetX=document.getElementById("offsetX")
const offsetY=document.getElementById("offsetY")
const repeatMode=document.getElementById("repeatMode")
const bg=document.getElementById("bg")

let img=null

drop.onclick=()=>fileInput.click()

fileInput.onchange=e=>{
loadFile(e.target.files[0])
}

document.addEventListener("dragover",e=>e.preventDefault())

document.addEventListener("drop",e=>{
e.preventDefault()
loadFile(e.dataTransfer.files[0])
})

function loadFile(file){

if(!file) return

const reader=new FileReader()

reader.onload=e=>{
img=e.target.result
drop.style.display="none"
updatePattern()
}

reader.readAsDataURL(file)

}

function updatePattern(){

if(!img) return

const size = scale.value

// 기본 배경
let bgImage = `url(${img})`

// 🔥 핵심: zigzag 구현
if(repeatMode.value !== "basic"){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=size*2
canvas.height=size*2

const image=new Image()
image.src=img

image.onload=()=>{

for(let x=0; x<2; x++){
for(let y=0; y<2; y++){

let dx = x * size
let dy = y * size

const col = x
const row = y

// 가로 지그재그
if(repeatMode.value==="zigzagX"){
if(row % 2 === 0){
dx += size/2
}
}

// 세로 지그재그
if(repeatMode.value==="zigzagY"){
if(col % 2 === 0){
dy += size/2
}
}

// 전체 지그재그
if(repeatMode.value==="zigzagXY"){
if(row % 2 === 0){
dx += size/2
}
if(col % 2 === 0){
dy += size/2
}
}

ctx.drawImage(image, dx, dy, size, size)

}
}

view.style.backgroundImage = `url(${canvas.toDataURL()})`
view.style.backgroundSize = size*2 + "px"

}

return
}

// basic 모드
view.style.backgroundImage = bgImage
view.style.backgroundSize = size + "px"

}

// 컨트롤
scale.oninput=updatePattern
offsetX.oninput=()=>{
view.style.backgroundPosition = offsetX.value+"px "+offsetY.value+"px"
}
offsetY.oninput=()=>{
view.style.backgroundPosition = offsetX.value+"px "+offsetY.value+"px"
}

repeatMode.onchange=updatePattern

bg.oninput=()=>{
view.style.backgroundColor=bg.value
}

document.getElementById("gridBtn").onclick=()=>{
grid.style.display = grid.style.display=="none"?"block":"none"
}

</script>

</body>
</html>
